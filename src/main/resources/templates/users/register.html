<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Ascend - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>

<body class="theme-bg overflow-hidden vh-100 m-0">
    <div class="row g-0 h-100">
        <div class="col-4 d-none d-md-block bg-accent p-4">
            <h2 class="fw-bold text-bg-main" style="letter-spacing: 2px;">ASCEND.</h2>
        </div>
        <div class="col-12 col-md-8 d-flex align-items-center justify-content-center h-100">
            <div class="theme-bg-container p-5" style="width: 100%; max-width: 500px;">
                <h1 class="text-start mb-4 fw-bold">Register</h1>

                <form action="/register" method="POST">
                    <div class="row mb-3">
                        <div class="col">
                            <input type="text" th:class="${firstnameError != null ? 'form-control theme-input p-3 border border-danger' : 'form-control theme-input p-3 border-0'}" th:value="${firstnameVal}" id="firstname" name="firstname" placeholder="First Name">
                        </div>

                        <div class="col">
                            <input type="text" th:class="${lastnameError != null ? 'form-control theme-input p-3 border border-danger' : 'form-control theme-input p-3 border-0'}" th:value="${lastnameVal}" id="lastname" name="lastname" placeholder="Last Name">
                        </div>
                    </div>

                    <div class="mb-3">
                        <input type="text" th:class="${usernameError != null ? 'form-control theme-input p-3 border border-danger' : 'form-control theme-input p-3 border-0'}" th:value="${usernameVal}" id="username" name="username" placeholder="Username">
                    </div>

                    <div class="mb-4">
                        <input type="password" th:class="${passwordError != null ? 'form-control theme-input p-3 border border-danger' : 'form-control theme-input p-3 border-0'}" id="password" name="password" placeholder="Password">

                        <div class="d-flex align-items-center mt-2">
                            <div class="progress flex-grow-1 me-3" style="height: 8px;" id="password-strength-container">
                                <div id="password-strength-bar" class="progress-bar" role="progressbar" style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                            </div>

                            <small id="password-strength-text" class="text-white mb-0 fw-bold" style="width: 45px;">None</small>
                        </div>

                        <div th:if="${error}" class="text-danger text-start mt-2 small" style="margin-left: 16px;">
                            <span th:text="${error}"></span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 p-3 rounded-pill">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/password-strength.js"></script>
</body>

</html>
