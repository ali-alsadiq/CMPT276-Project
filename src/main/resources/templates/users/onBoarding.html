<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ascend - Set Your Goals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/618d4f1d54.js" crossorigin="anonymous"></script>
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="theme-bg vh-100 m-0 overflow-auto">
    <div class="p-4 p-md-5 d-flex flex-column align-items-center justify-content-center" style="min-height: 100vh;">
        <div style="width: 100%; max-width: 700px;">
            <h2 class="fw-bold mb-1">Welcome! Let's get you set up.</h2>
            <p class="mb-4" style="color: var(--text-secondary);">Tell us a bit about yourself and set your nutrition targets.</p>

            <form th:action="@{/onboarding}" method="post">

                <!-- Personal Info -->
                <div class="p-4 bg-primary rounded-4 mb-4">
                    <h5 class="text-secondary mb-4">Personal Info</h5>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label text-white" style="font-size: 0.85rem;">Sex</label>
                            <select name="sex" class="form-select border-0 rounded-3 text-white" style="background-color: var(--bg-input) !important;">
                                <option value="" disabled selected>Select your sex</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                                <option value="Prefer not to say">Prefer not to say</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-white" style="font-size: 0.85rem;">Date of Birth</label>
                            <input type="date" name="dateOfBirth" class="form-control bg-transparent text-white border-0 rounded-3"
                                   style="background-color: var(--bg-input) !important;">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-white" style="font-size: 0.85rem;">Height (cm)</label>
                            <input type="number" name="height" step="0.1" min="50" max="300"
                                   class="form-control bg-transparent text-white border-0 rounded-3"
                                   style="background-color: var(--bg-input) !important;"
                                   placeholder="e.g. 175">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-white" style="font-size: 0.85rem;">Weight (kg)</label>
                            <input type="number" name="weight" step="0.1" min="20" max="500"
                                   class="form-control bg-transparent text-white border-0 rounded-3"
                                   style="background-color: var(--bg-input) !important;"
                                   placeholder="e.g. 70">
                        </div>
                    </div>
                </div>

                <!-- Calorie Goal -->
                <div class="p-4 bg-primary rounded-4 mb-4">
                    <h5 class="text-secondary mb-4">Calorie Goal</h5>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label text-white" style="font-size: 0.85rem;">Daily Calories (kcal)</label>
                            <input type="number" name="dailyCalories" class="form-control bg-transparent text-white border-0 rounded-3"
                                   style="background-color: var(--bg-input) !important;"
                                   placeholder="e.g. 2000" min="0">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-white" style="font-size: 0.85rem;">Weekly Calories (kcal)</label>
                            <input type="number" name="weeklyCalories" class="form-control bg-transparent text-white border-0 rounded-3"
                                   style="background-color: var(--bg-input) !important;"
                                   placeholder="e.g. 14000" min="0">
                        </div>
                    </div>
                </div>

                <!-- Nutrients -->
                <div class="p-4 bg-primary rounded-4 mb-4">
                    <h5 class="text-secondary mb-4">Nutrient Goals <span style="font-size: 0.8rem; font-weight: 400;">(daily)</span></h5>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label text-white" style="font-size: 0.85rem;">Protein (g)</label>
                            <input type="number" name="protein" class="form-control bg-transparent text-white border-0 rounded-3"
                                   style="background-color: var(--bg-input) !important;"
                                   placeholder="e.g. 150" min="0">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-white" style="font-size: 0.85rem;">Carbs (g)</label>
                            <input type="number" name="carbs" class="form-control bg-transparent text-white border-0 rounded-3"
                                   style="background-color: var(--bg-input) !important;"
                                   placeholder="e.g. 200" min="0">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-white" style="font-size: 0.85rem;">Fats (g)</label>
                            <input type="number" name="fats" class="form-control bg-transparent text-white border-0 rounded-3"
                                   style="background-color: var(--bg-input) !important;"
                                   placeholder="e.g. 65" min="0">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-white" style="font-size: 0.85rem;">Fiber (g)</label>
                            <input type="number" name="fiber" class="form-control bg-transparent text-white border-0 rounded-3"
                                   style="background-color: var(--bg-input) !important;"
                                   placeholder="e.g. 30" min="0">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-white" style="font-size: 0.85rem;">Sugar (g)</label>
                            <input type="number" name="sugar" class="form-control bg-transparent text-white border-0 rounded-3"
                                   style="background-color: var(--bg-input) !important;"
                                   placeholder="e.g. 50" min="0">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-white" style="font-size: 0.85rem;">Sodium (mg)</label>
                            <input type="number" name="sodium" class="form-control bg-transparent text-white border-0 rounded-3"
                                   style="background-color: var(--bg-input) !important;"
                                   placeholder="e.g. 2300" min="0">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-white" style="font-size: 0.85rem;">Potassium (mg)</label>
                            <input type="number" name="potassium" class="form-control bg-transparent text-white border-0 rounded-3"
                                   style="background-color: var(--bg-input) !important;"
                                   placeholder="e.g. 3500" min="0">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-white" style="font-size: 0.85rem;">Cholesterol (mg)</label>
                            <input type="number" name="cholesterol" class="form-control bg-transparent text-white border-0 rounded-3"
                                   style="background-color: var(--bg-input) !important;"
                                   placeholder="e.g. 300" min="0">
                        </div>
                    </div>
                </div>

                <!-- Submit -->
                <div>
                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-light fw-semibold px-4">Save Goals</button>
                        <a th:href="@{/dashboard}" class="btn fw-semibold px-4" style="background-color: var(--bg-input); color: var(--text-secondary);">Skip for now</a>
                    </div>
                </div>

            </form>
        </div>
    </div>
</body>
</html>
