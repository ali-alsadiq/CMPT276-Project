<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <title>Ascend - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>

<body class="theme-bg auth-bg-image overflow-hidden vh-100 m-0">
    <div class="row g-0 h-100">
        <div class="col-4 d-none d-md-block bg-transparent p-4">
            <h2 class="fw-bold text-theme-primary" style="letter-spacing: 2px;">ASCEND.</h2>
        </div>
        <div class="col-12 col-md-8 d-flex align-items-center justify-content-center h-100 auth-overlay">
            <div class="p-5" style="width: 100%; max-width: 500px;">
                <h1 class="text-start mb-4 fw-bold">Sign in</h1>

                <form action="/login" method="POST">
                    <div class="mb-3">
                        <input type="text" th:class="${usernameError != null ? 'form-control theme-input p-3 border border-danger' : 'form-control theme-input p-3 border-0'}" 
                               th:value="${usernameVal}" id="username" name="username" placeholder="Username*">
                    </div>

                    <div class="mb-4">
                        <input type="password" th:class="${passwordError != null ? 'form-control theme-input p-3 border border-danger' : 'form-control theme-input p-3 border-0'}" 
                               id="password" name="password" placeholder="Password*">
                        <div th:if="${error}" class="text-danger text-start mt-2 small" style="margin-left: 16px;">
                            <span th:text="${error}"></span>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 p-3 rounded-pill fw-bold">Login</button>

                    <div class="text-center mt-3">
                        <a href="/register" class="text-decoration-none small text-secondary">Don't have an account?</a>
                    </div>
                </form>
            </div>
        </div>
        </div>
    </div>
</body>

</html>
