<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ascend - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/618d4f1d54.js" crossorigin="anonymous"></script>
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="theme-bg overflow-hidden vh-100 m-0">
    <div class="row g-0 h-100">
        <div class="col-4 d-none d-md-block bg-accent p-4">
            <h2 class="fw-bold text-bg-main" style="letter-spacing: 2px;">ASCEND.</h2>
        </div>
        <div class="col-12 col-md-8 d-flex align-items-center justify-content-center h-100 ">
            <div class="theme-bg-container p-5 position-relative h-100" style="width: 100%; max-width: 500px; ">
                <!-- NAV Section -->
                <div class="w-100">
                    <ul class="bottom-nav d-flex justify-content-center position-absolute">
                        <li>
                            <a th:href="@{/dashboard}">
                                <i class="fa-solid fa-chart-area p-3" style="font-size: 1.8rem;"></i>
                            </a>
                        </li>
                        <li>
                            <a th:href="@{/workout}">
                                <i class="fa-solid fa-dumbbell  p-3"style="font-size: 1.8rem;"></i>
                            </a>
                        </li>
                        <li>
                            <a th:href="@{/caloriesTracker}">
                                <i class="fa-solid fa-plate-wheat  p-3" style="font-size: 1.8rem;"></i>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll(".progress-circle").forEach(circle => {
            const value = circle.style.getPropertyValue("--value").trim();
            const text = circle.querySelector(".progress-value");
            if (text) text.textContent = `${value}%`;
        });
    </script>
</body>

</html>
