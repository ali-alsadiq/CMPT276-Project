<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascend - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/618d4f1d54.js" crossorigin="anonymous"></script>
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="theme-bg overflow-hidden vh-100 m-0">
    <div class="d-flex h-100 w-100">
        <!-- Sidebar -->
        <div th:replace="~{fragments/navbar :: navbar('dashboard')}"></div>
        
        <div class="flex-grow-1 w-100 p-4 p-md-5 overflow-auto h-100 bg-secondary">
            <!-- Remaining dashboard logic / placeholder content -->
            <h2 class="fw-bold text-white mb-4" style="letter-spacing: 2px;">DASHBOARD</h2>
            <div class="theme-bg-container p-5" style="width: 100%; max-width: 500px;">
                <p>Welcome to your Ascend dashboard. Select an option from the sidebar to get started.</p>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll(".progress-circle").forEach(circle => {
            const value = circle.style.getPropertyValue("--value").trim();
            const text = circle.querySelector(".progress-value");
            if (text) text.textContent = `${value}%`;
        });
    </script>
</body>

</html>
