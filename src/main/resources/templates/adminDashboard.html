<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="theme-bg p-4 p-md-5">
    <h2 class="fw-bold mb-4">Admin view</h2>

    <div class="container mt-5">
        <li class="py-2" th:each="user : ${users}" th:text="${user.username} + ' (UID: ' + ${user.uid} + ') - Role: ' + ${user.role}">
        </li>
    </div>

</body>
</html>
