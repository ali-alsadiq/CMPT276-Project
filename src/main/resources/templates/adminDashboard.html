<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ascend - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">
        <h2>Admin view</h2>
        <a href="/logout" class="btn btn-sm btn-outline-secondary mb-3">Logout</a>

        <ul class="list-group" style="max-width: 600px;">
            
            <li class="list-group-item d-flex justify-content-between" th:each="user : ${users}">
                
                <span>
                    <strong th:text="${user.username}">Username</strong> 
                    <span class="text-muted" th:text="' (UID: ' + ${user.uid} + ')'"></span>
                </span>
                
                <span class="text-muted" th:text="${user.role}">ROLE</span>
                
            </li>

        </ul>
    </div>

</body>
</html>
