<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin</title>
</head>
<body>

    <h2>Admin view</h2>

    <div class="container mt-5">
        <li th:each="user : ${users}" th:text="${user.username} + ' (UID: ' + ${user.uid} + ') - Role: ' + ${user.role}">
        </li>
    </div>

</body>
</html>
