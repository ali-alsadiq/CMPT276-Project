<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
<body class="theme-bg vh-100 m-0 overflow-hidden">
    
    <div class="row g-0 h-100">
        <!-- Sidebar -->
        <div class="col-4 col-md-3 bg-black p-4">
            <h5 class="fw-bold mb-4">Menu</h5>
            <ul class="list-unstyled">
                <li class="mb-3">Admin Dashboard</li>
            </ul>
        </div>

        <!-- Main Section -->
        <div class="col-8 col-md-9 p-4 p-md-5 overflow-auto h-100">
            <h2 class="fw-bold mb-4">Admin view</h2>

            <div class="container mt-5">
                <li class="py-2" th:each="user : ${users}" th:text="${user.username} + ' (UID: ' + ${user.uid} + ') - Role: ' + ${user.role}">
                </li>
            </div>
        </div>
    </div>

</body>
</html>
