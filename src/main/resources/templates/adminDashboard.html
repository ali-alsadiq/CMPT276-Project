<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/618d4f1d54.js" crossorigin="anonymous"></script>
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/theme.js"></script>
    <link rel="stylesheet" href="/css/navbar.css">
</head>
<body class="theme-bg vh-100 m-0 overflow-hidden">
    <div class="d-flex h-100 w-100">
        <!-- Sidebar -->
        <div th:replace="~{fragments/navbar :: navbar('adminDashboard')}"></div>

        <div class="flex-grow-1 w-100 p-4 p-md-5 overflow-auto h-100 bg-secondary" style="margin-left: 110px;">
            <h2 class="fw-bold mb-4">Admin Dashboard</h2>

            <div class="mt-4 p-4 bg-primary rounded-4" style="max-width: 600px;">
                <div class="d-flex flex-column">
                    <div th:each="user, iterStat : ${users}">
                        <div class="d-flex justify-content-between align-items-center py-2">
                            <div class="d-flex align-items-center gap-3">
                                <div class="rounded" style="width: 40px; height: 40px; background-color: var(--bg-accent);"></div>
                                
                                <div class="d-flex align-items-center gap-2">
                                    <span class="fw-semibold text-theme-primary" th:text="${user.username}"></span>
                                    <span class="badge rounded-pill text-black bg-accent-1 px-2 py-1" style="font-size: 0.75rem;" th:if="${user.role == 'ADMIN'}">Admin</span>
                                </div>
                            </div>

                            <span class="fw-medium" style="color: var(--text-secondary);" th:text="'UID ' + ${user.uid}"></span>
                        </div>

                        <hr class="m-0" style="border-color: var(--text-secondary); opacity: 0.2;" th:if="${!iterStat.last}">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/navbar.js"></script>
</body>
</html>
