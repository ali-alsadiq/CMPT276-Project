<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
<body class="theme-bg vh-100 m-0 overflow-hidden">
    
    <div class="d-flex h-100 w-100">
        <!-- Sidebar -->
        <div class="bg-main p-4 d-flex flex-column" style="width: 350px; flex-shrink: 1;">
            <div class="mb-5 mt-3 d-flex flex-column gap-3">
                <div class="d-flex gap-3">
                    <div class="rounded" style="width: 40px; height: 40px; background-color: var(--bg-input); flex-shrink: 0;"></div>
                    <div class="d-flex flex-column justify-content-start pt-2">
                        <strong class="text-uppercase text-white fw-bold lh-1 mb-1" style="font-size: 13px; letter-spacing: 1px;" th:text="${session.session_user.username}">admin</strong>

                        <!-- RANK IS NOT IMPLEMENTED YET -->
                        <span class="text-uppercase lh-1" style="font-size: 11px; color: var(--text-secondary); letter-spacing: 0.5px;">SILVER II</span>
                    </div>
                </div>
                
                <!-- XP IS NOT IMPLEMENTED YET -->
                <div class="w-100">
                    <div class="d-flex justify-content-between mb-1" style="font-size: 10px; color: var(--text-secondary);">
                        <span>800 XP</span>
                        <span>1000 XP</span>
                    </div>
                    <div class="progress" style="height: 4px; background-color: var(--bg-surface);">
                        <div class="progress-bar bg-accent" role="progressbar" style="width: 80%" aria-valuenow="80" aria-valuemin="0" aria-valuemax="100"></div>
                    </div>
                </div>
            </div>
            
            <ul class="nav flex-column gap-2" style="font-size: 14px;">
                <li class="nav-item">
                    <a href="#" class="nav-link text-black rounded px-3 py-2 fw-semibold bg-accent">
                        Admin Dashboard
                    </a>
                </li>
                
                <li class="nav-item">
                    <a href="#" class="nav-link text-white rounded px-3 py-2 fw-semibold">
                        Insight and Progress
                    </a>
                </li>
                
                <li class="nav-item">
                    <a href="#" class="nav-link text-white rounded px-3 py-2 fw-semibold">
                        Nutrition Tracker
                    </a>
                </li>
                
                <li class="nav-item">
                    <a href="#" class="nav-link text-white rounded px-3 py-2 fw-semibold">
                        Wellness Tracker
                    </a>
                </li>
                
                <li class="nav-item">
                    <a href="#" class="nav-link text-white rounded px-3 py-2 fw-semibold">
                        Settings
                    </a>
                </li>
            </ul>
        </div>

        <!-- Main Section -->
        <div class="flex-grow-1 w-100 p-4 p-md-5 overflow-auto h-100 bg-surface">
            <h2 class="fw-bold mb-4">Admin Dashboard</h2>

            <div class="mt-4 p-4 bg-main rounded-4" style="max-width: 600px;">
                <div class="d-flex flex-column">
                    <div th:each="user, iterStat : ${users}">
                        <div class="d-flex justify-content-between align-items-center py-2">
                            <div class="d-flex align-items-center gap-3">
                                <div class="rounded" style="width: 40px; height: 40px; background-color: var(--bg-input);"></div>
                                
                                <div class="d-flex align-items-center gap-2">
                                    <span class="fw-semibold text-white" th:text="${user.username}"></span>
                                    <span class="badge rounded-pill text-black bg-accent px-2 py-1" style="font-size: 0.75rem;" th:if="${user.role == 'ADMIN'}">Admin</span>
                                </div>
                            </div>

                            <span class="fw-medium" style="color: var(--text-secondary);" th:text="'UID ' + ${user.uid}"></span>
                        </div>

                        <hr class="m-0" style="border-color: var(--text-secondary); opacity: 0.2;" th:if="${!iterStat.last}">
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
