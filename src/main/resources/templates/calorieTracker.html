<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nutrition Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/618d4f1d54.js" crossorigin="anonymous"></script>
    <link href="/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/calorieTracker.css">
</head>
<body class="theme-bg vh-100 m-0 overflow-hidden">

    <div class="d-flex h-100 w-100">

        <!-- Sidebar -->
        <div th:replace="~{fragments/navbar :: navbar('calorieTracker')}"></div>

        <!-- Main Content -->
        <div class="flex-grow-1 p-3 overflow-auto h-100 bg-secondary">
            <div class="row g-4 w-100 h-100">

                <!-- LEFT COLUMN: Meal Log + Food Entry -->
                <div class="col-lg-8 h-100">
                    <div class="bg-primary rounded-4 p-4 h-100 d-flex gap-0">
                        <div class="w-50 d-flex flex-column">
                            <h3 class="mb-4">Log a Meal</h3> 
                        </div>

                        <!-- Vertical Divider -->
                        <div class="mx-4" style="width: 1px; background-color: var(--bg-secondary); opacity: 0.6;"></div>

                        <div class="flex-grow-1 overflow-auto h-100 ps-2 pe-4">
                            <h4 class="mb-4">Meals</h4>
                            <div class="d-flex justify-content-between align-items-center mb-4 gap-3">
                                <div class="flex-grow-1 d-flex align-items-center rounded-3 px-3 py-2" style="background-color: var(--bg-input);">
                                    <i class="fa-solid fa-magnifying-glass text-secondary me-2"></i>
                                    <input type="text" class="bg-transparent border-0 text-secondary w-100" placeholder="Search meals" style="outline: none;">
                                </div>
                                
                                <div class="text-white rounded-3 px-3 py-2 d-flex align-items-center gap-2" style="cursor: pointer; background-color: var(--bg-input); flex-shrink: 0;">
                                    <i class="fa-regular fa-calendar text-secondary"></i>
                                    <span class="text-secondary">Today</span>
                                </div>
                            </div>

                            <div class="meal-row" th:each="meal : ${meals}">
                                <img src="" alt="Meal image" class="meal-image">
                                <div class="meal-info">
                                    <div class="meal-name-row">
                                        <span class="meal-name" th:text="${meal.name}">Chicken Salad</span>
                                        <span class="meal-cals" th:text="${meal.calories} + ' cals'">420 cals</span>
                                    </div>
                                    <span class="meal-meta" th:text="${meal.protein} + 'g protein · ' + ${meal.fats} + 'g fats · ' + ${meal.carbs} + 'g carbs'">24g protein · 18g fats · 19g carbs</span>
                                </div>
                            </div>

                            <div class="meal-row">
                                <img src="" alt="Meal image" class="meal-image">
                                <div class="meal-info">
                                    <div class="meal-name-row">
                                        <span class="meal-name">Chicken Salad</span>
                                        <span class="meal-cals">420 cals</span>
                                    </div>
                                    <span class="meal-meta">24g protein · 18g fats · 19g carbs</span>
                                </div>
                            </div>

                            <div class="meal-row">
                                <img src="" alt="Meal image" class="meal-image">
                                <div class="meal-info">
                                    <div class="meal-name-row">
                                        <span class="meal-name">Beef Rice Bowl</span>
                                        <span class="meal-cals">610 cals</span>
                                    </div>
                                    <span class="meal-meta">35g protein · 22g fats · 58g carbs</span>
                                </div>
                            </div>

                        </div>
                    </div>
                    
                </div>

                <!-- ── RIGHT COLUMN: Progress / Analytics ── -->
                <div class="col-lg-4 h-100">
                    <div class="bg-primary rounded-4 p-4 h-100 d-flex flex-column gap-4">

                        <!-- Total progress ring + legend -->
                        <div class="progress-top">
                            <div class="progress-wrapper progress-wrapper-total">
                                <div class="progress-circle progress-circle-total"
                                    role="progressbar" aria-valuemin="0" aria-valuemax="100"
                                    th:attr="aria-valuenow=${totalPercent}"
                                    aria-labelledby="progress-total"
                                    th:style="'--value:' + ${totalPercent} + '; --progress-color: #0022FF;'">
                                    <span class="progress-value" th:text="${totalPercent} + '%'">67%</span>
                                </div>
                                <p id="progress-total" class="progress-label fs-5">Total Progress</p>
                            </div>

                            <div class="progress-legend">
                                <div class="progress-legend-item">
                                    <span class="progress-legend-dot" style="color: #FFABAB;">
                                        <i class="fa-solid fa-square"></i>
                                    </span>
                                    <span>Protein intake</span>
                                </div>
                                <div class="progress-legend-item">
                                    <span class="progress-legend-dot" style="color: #96FFFF;">
                                        <i class="fa-solid fa-square"></i>
                                    </span>
                                    <span>Carb intake</span>
                                </div>
                                <div class="progress-legend-item">
                                    <span class="progress-legend-dot" style="color: #F2E0E0;">
                                        <i class="fa-solid fa-square"></i>
                                    </span>
                                    <span>Macro balance</span>
                                </div>
                            </div>
                        </div>

                        <!-- Small macro rings -->
                        <div class="progress-bottom">
                            <div class="progress-wrapper">
                                <div class="progress-circle progress-circle-small"
                                    role="progressbar" aria-valuemin="0" aria-valuemax="100"
                                    th:attr="aria-valuenow=${proteinPercent}"
                                    aria-labelledby="progress-protein"
                                    th:style="'--value:' + ${proteinPercent} + '; --progress-color: #FFABAB;'">
                                    <span class="progress-value progress-value-small" th:text="${proteinPercent} + '%'">82%</span>
                                </div>
                                <p id="progress-protein" class="progress-label">Protein</p>
                            </div>

                            <div class="progress-wrapper">
                                <div class="progress-circle progress-circle-small"
                                    role="progressbar" aria-valuemin="0" aria-valuemax="100"
                                    th:attr="aria-valuenow=${carbsPercent}"
                                    aria-labelledby="progress-carbs"
                                    th:style="'--value:' + ${carbsPercent} + '; --progress-color: #96FFFF;'">
                                    <span class="progress-value progress-value-small" th:text="${carbsPercent} + '%'">74%</span>
                                </div>
                                <p id="progress-carbs" class="progress-label">Carbs</p>
                            </div>

                            <div class="progress-wrapper">
                                <div class="progress-circle progress-circle-small"
                                    role="progressbar" aria-valuemin="0" aria-valuemax="100"
                                    th:attr="aria-valuenow=${macrosPercent}"
                                    aria-labelledby="progress-macros"
                                    th:style="'--value:' + ${macrosPercent} + '; --progress-color: #F2E0E0;'">
                                    <span class="progress-value progress-value-small" th:text="${macrosPercent} + '%'">91%</span>
                                </div>
                                <p id="progress-macros" class="progress-label">Macros</p>
                            </div>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script th:src="@{/js/calorieTracker.js}"></script>
</body>
</html>
