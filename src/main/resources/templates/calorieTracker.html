<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nutrition Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/618d4f1d54.js" crossorigin="anonymous"></script>
    <link href="/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/calorieTracker.css">
</head>
<body class="theme-bg vh-100 m-0 overflow-hidden">

    <div class="d-flex h-100 w-100">

        <!-- Sidebar -->
        <div th:replace="~{fragments/navbar :: navbar('calorieTracker')}"></div>

        <!-- Main Content -->
        <div class="flex-grow-1 p-4 bg-secondary d-flex flex-column overflow-hidden" style="height: 100vh;">
            <div class="row g-4 m-0 flex-grow-1 overflow-hidden">

                <!-- LEFT COLUMN: Meal Log + Food Entry -->
                <!-- LEFT COLUMN: Logging Section -->
                <div class="col-lg-6 d-flex flex-column overflow-hidden">
                    <div class="bg-primary rounded-4 p-4 h-100 d-flex flex-column">
                        <h4 class="mb-4 text-secondary">Logging</h4>
                        
                        <div class="flex-grow-1 d-flex flex-column align-items-center justify-content-center">
                            <div class="text-start">
                                <p class="text-secondary mb-0">Hi <span th:text="${session.session_user.firstname}">User</span>,</p>
                                <h3 class="text-white fw-bold">Let's Add a Meal!</h3>
                            </div>
                        </div>

                        <div class="mt-auto p-3 d-flex flex-column border-0 rounded-4" style="background-color: var(--bg-input); border: 1px solid rgba(255,255,255,0.15);">
                            <textarea class="form-control bg-transparent border-0 text-white shadow-none px-2 pt-2 mb-2" 
                                    rows="3" 
                                    placeholder="E.g., 2 scrambled eggs, a piece of whole wheat toast, and a black coffee..." 
                                    style="resize: none; outline: none;"></textarea>

                            <div class="d-flex justify-content-between align-items-center px-2 pb-1">
                                <div class="text-white" style="cursor: pointer;">
                                    <i class="fa-solid fa-circle-plus fs-5"></i>
                                </div>
                                
                                <div class="bg-white text-bg-primary rounded-circle d-flex align-items-center justify-content-center" 
                                    style="width: 36px; height: 36px; cursor: pointer;">
                                    <i class="fa-solid fa-arrow-up"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- RIGHT COLUMN: Meals + Analytics -->
                <div class="col-lg-6 d-flex flex-column gap-4 overflow-hidden">
                    
                    <!-- Meals Card -->
                    <div class="bg-primary rounded-4 p-4 d-flex flex-column flex-grow-1 overflow-hidden">
                        <h4 class="mb-4 text-secondary">Meals</h4>
                        <div class="d-flex justify-content-between align-items-center mb-4 gap-3">
                            <div class="flex-grow-1 d-flex align-items-center rounded-3 px-3 py-2" style="background-color: var(--bg-input);">
                                <i class="fa-solid fa-magnifying-glass text-secondary me-2"></i>
                                <input type="text" class="bg-transparent border-0 text-white w-100" placeholder="Search meals" style="outline: none;">
                            </div>
                            
                            <div class="text-white rounded-3 px-3 py-2 d-flex align-items-center gap-2" style="cursor: pointer; background-color: var(--bg-input); flex-shrink: 0;">
                                <i class="fa-regular fa-calendar text-secondary"></i>
                                <span class="text-secondary">Today</span>
                            </div>
                        </div>

                        <div class="overflow-auto pe-3">
                            <div class="meal-row" th:each="meal : ${meals}">
                                <img src="" alt="Meal image" class="meal-image">
                                <div class="meal-info">
                                    <div class="meal-name-row">
                                        <span class="meal-name" th:text="${meal.name}">Chicken Salad</span>
                                        <span class="meal-cals" th:text="${meal.calories} + ' cals'">420 cals</span>
                                    </div>
                                    <span class="meal-meta" th:text="${meal.protein} + 'g protein · ' + ${meal.fats} + 'g fats · ' + ${meal.carbs} + 'g carbs'">24g protein · 18g fats · 19g carbs</span>
                                </div>
                            </div>
                            
                            <!-- Placeholder Meal Rows for UI demo -->
                            <div class="meal-row">
                                <img src="" alt="Meal image" class="meal-image">
                                <div class="meal-info">
                                    <div class="meal-name-row">
                                        <span class="meal-name">Chicken Salad</span>
                                        <span class="meal-cals">420 cals</span>
                                    </div>
                                    <span class="meal-meta">24g protein · 18g fats · 19g carbs</span>
                                </div>
                            </div>

                            <div class="meal-row">
                                <img src="" alt="Meal image" class="meal-image">
                                <div class="meal-info">
                                    <div class="meal-name-row">
                                        <span class="meal-name">Beef Rice Bowl</span>
                                        <span class="meal-cals">610 cals</span>
                                    </div>
                                    <span class="meal-meta">35g protein · 22g fats · 58g carbs</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Analytics Card -->
                    <div class="bg-primary rounded-4 p-4">
                        <h4 class="mb-4 text-secondary">Nutrition</h4>
                        <div class="d-flex align-items-center justify-content-between px-2">
                            <!-- Main Calorie Chart -->
                            <div class="progress-wrapper">
                                <div class="progress-circle progress-circle-total"
                                    role="progressbar" aria-valuemin="0" aria-valuemax="100"
                                    th:attr="aria-valuenow=${totalPercent}"
                                    th:style="'--value:' + ${totalPercent} + '; --progress-color: #e4d9dc;'">
                                    <span class="progress-value" th:text="${totalPercent} + '%'">67%</span>
                                </div>
                                <p class="progress-label mt-2">Calories</p>
                            </div>

                            <!-- Small Macro Charts Row -->
                            <div class="d-flex gap-3">
                                <div class="progress-wrapper">
                                    <div class="progress-circle progress-circle-small"
                                        role="progressbar" aria-valuemin="0" aria-valuemax="100"
                                        th:attr="aria-valuenow=${proteinPercent}"
                                        th:style="'--value:' + ${proteinPercent} + '; --progress-color: #f3c7cf;'">
                                        <span class="progress-value progress-value-small" th:text="${proteinPercent} + '%'">82%</span>
                                    </div>
                                    <p class="progress-label">Proteins</p>
                                </div>

                                <div class="progress-wrapper">
                                    <div class="progress-circle progress-circle-small"
                                        role="progressbar" aria-valuemin="0" aria-valuemax="100"
                                        th:attr="aria-valuenow=${carbsPercent}"
                                        th:style="'--value:' + ${carbsPercent} + '; --progress-color: #bfdbe9;'">
                                        <span class="progress-value progress-value-small" th:text="${carbsPercent} + '%'">74%</span>
                                    </div>
                                    <p class="progress-label">Carbs</p>
                                </div>

                                <div class="progress-wrapper">
                                    <div class="progress-circle progress-circle-small"
                                        role="progressbar" aria-valuemin="0" aria-valuemax="100"
                                        th:attr="aria-valuenow=${macrosPercent}"
                                        th:style="'--value:' + ${macrosPercent} + '; --progress-color: #d0dcdb;'">
                                        <span class="progress-value progress-value-small" th:text="${macrosPercent} + '%'">91%</span>
                                    </div>
                                    <p class="progress-label">Fats</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>



            </div>
        </div>
    </div>

    <script th:src="@{/js/calorieTracker.js}"></script>
</body>
</html>
