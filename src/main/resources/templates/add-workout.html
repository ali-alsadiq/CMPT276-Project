<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="theme-bg overflow-hidden vh-100 m-0">
    <div class="container mt-4">
        <h1>Workout Calorie Calculator</h1>

        <form method="post" th:action="@{/add-workout}">
            <label for="activity">Activity:</label>
            <input type="text" class="form-control" id="activity" name="activity" required><br><br>

            <label for="duration">Duration (minutes):</label>
            <input type="number" class="form-control" id="duration" name="duration" min="1" required><br><br>

            <button class="btn btn-primary" type="submit">Calculate Calories</button>
        </form>

        <div th:if="${workout != null}">
            <h2>Result:</h2>
            <p>Calories burned for <strong th:text="${workout.workoutName}"></strong>
            over <strong th:text="${workout.duration}"></strong> minutes:
            <strong th:text="${workout.calsBurned}"></strong></p>
        </div>
    </div>
</body>
</html>
