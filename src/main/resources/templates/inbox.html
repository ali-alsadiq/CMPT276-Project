<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ascend - Inbox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://kit.fontawesome.com/618d4f1d54.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/calorie-tracker.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/navbar.css" />
    <script src="/js/theme.js"></script>
</head>

<body class="theme-bg vh-100 m-0 overflow-hidden">
    <div class="d-flex h-100 w-100">
        <!-- Navbar -->
        <div th:replace="~{shared/navbar :: navbar('inbox')}"></div>
        
        <!-- Main Content -->
        <main class="flex-grow-1 tracker-shell bg-secondary overflow-hidden" style="height: 100vh; margin-left: 110px">
            <div class="row m-0 h-100 overflow-hidden">
                <div class="col-xl-8 d-flex flex-column h-100 overflow-hidden py-4">
                    <section class="tracker-panel gradient-tl d-flex flex-column h-100 overflow-hidden">
                        <!-- Header Section-->
                        <header class="mb-4">
                            <p class="eyebrow mb-2 text-accent-1">MESSAGE</p>
                            <h1 class="panel-title text-theme-primary" style="font-weight: 500; letter-spacing: normal">INBOX</h1>
                            <p class="panel-copy text-secondary">Friend requests and notifications.</p>
                        </header>

                        <!-- Alerts -->
                        <div th:if="${error != null}" class="alert alert-danger alert-dismissible fade show mb-3 mx-auto" style="width: 85%;" role="alert">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            <span th:text="${error}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <div th:if="${success != null}" class="alert alert-success alert-dismissible fade show mb-3 mx-auto" style="width: 85%;" role="alert">
                            <i class="fas fa-check-circle me-2"></i>
                            <span th:text="${success}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <!-- Mail List Section -->
                        <div class="meals-scrollable mx-auto mb-4 d-flex flex-column" style="width: 85%; max-height: none; flex: 1;">
                            <div th:if="${pendingRequests == null || #lists.isEmpty(pendingRequests)}" 
                                 class="d-flex flex-column align-items-center justify-content-center flex-grow-1 py-5">
                                <i class="fa-regular fa-envelope-open fs-1 text-secondary mb-3"></i>
                                <p class="text-secondary mb-0">No messages</p>
                            </div>

                            <div th:unless="${pendingRequests == null || #lists.isEmpty(pendingRequests)}">
                                <div class="meal-row align-items-center" th:each="request : ${pendingRequests}">
                                    <div class="rounded-3 d-flex align-items-center justify-content-center" style="width: 44px; height: 44px; background: var(--bg-subtle-box); flex-shrink: 0;">
                                        <i class="fas fa-user text-secondary"></i>
                                    </div>

                                    <div class="meal-info">
                                        <div class="meal-name-row">
                                            <span class="meal-name" th:text="${request.sender.firstname + ' ' + request.sender.lastname}">Name</span>
                                            <span class="meal-cals" th:text="'@' + ${request.sender.username}">@user</span>
                                        </div>

                                        <div class="d-flex align-items-center gap-2 mt-2">
                                            <form th:action="@{/acceptFriendRequest}" method="post" class="m-0">
                                                <input type="hidden" name="requestId" th:value="${request.id}">
                                                <button type="submit" class="badge rounded-pill text-black bg-accent-1 border-0 px-3 py-1" style="font-size: 0.70rem; cursor: pointer; height: 24px; line-height: 1;">
                                                    <i class="fas fa-check me-1"></i> Accept
                                                </button>
                                            </form>
                                            
                                            <form th:action="@{/rejectFriendRequest}" method="post" class="m-0">
                                                <input type="hidden" name="requestId" th:value="${request.id}">
                                                <button type="submit" class="badge rounded-pill text-white bg-danger border-0 px-3 py-1" style="font-size: 0.70rem; cursor: pointer; height: 24px; line-height: 1;">
                                                    <i class="fas fa-times me-1"></i> Reject
                                                </button>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <!-- Need bootstrap JS for alerts to be dismissible -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/navbar.js"></script>
</body>
</html>
