<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Ascend - Inbox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/618d4f1d54.js" crossorigin="anonymous"></script>
    <link href="/css/style.css" rel="stylesheet">
    <link href="/css/components.css" rel="stylesheet">
    <link href="/css/dashboard.css" rel="stylesheet">
    <script src="/js/theme.js"></script>
    <link rel="stylesheet" href="/css/navbar.css">
</head>

<body class="theme-bg overflow-hidden dashboard-viewport m-0">
    <div class="d-flex h-100 w-100">
        <div th:replace="~{shared/navbar :: navbar('inbox')}"></div>
        
        <main class="flex-grow-1 dashboard-shell">
            <div class="dashboard-main-card">
                <div class="container-fluid p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <p class="eyebrow mb-2">Messages</p>
                            <h1 class="dashboard-title mb-1">Inbox</h1>
                            <p class="dashboard-copy mb-0">Notifications</p>
                        </div>
                        <i class="fa-regular fa-envelope fs-1 text-white-50"></i>
                    </div>

                    <div class="theme-bg-container p-4 rounded-4">
                        <h3 class="mb-3">
                            <span th:if="${pendingRequests != null && !#lists.isEmpty(pendingRequests)}" 
                                  class="badge bg-danger ms-2" th:text="${#lists.size(pendingRequests)}"></span>
                        </h3>
                        
                        <div th:if="${pendingRequests == null || #lists.isEmpty(pendingRequests)}" 
                             class="text-center py-5">
                            <i class="fa-regular fa-envelope-open fs-1 text-white-50 mb-3"></i>
                            <p class="text-white-50 mb-0">No messages</p>
                        </div>

                        <div th:unless="${pendingRequests == null || #lists.isEmpty(pendingRequests)}">
                            <div th:each="request : ${pendingRequests}" 
                                 class="d-flex justify-content-between align-items-center p-3 rounded-3 mb-2 theme-input">
                                <div>
                                    <div class="d-flex align-items-center gap-3">
                                        <div class="rounded-circle bg-primary d-flex align-items-center justify-content-center" 
                                             style="width: 40px; height: 40px;">
                                            <i class="fas fa-user text-white"></i>
                                        </div>
                                        <div>
                                            <h6 class="text-white mb-0" th:text="${request.sender.firstname + ' ' + request.sender.lastname}"></h6>
                                            <small class="text-white-50">@<span th:text="${request.sender.username}"></span></small>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="d-flex gap-2">
                                    <form th:action="@{/acceptFriendRequest}" method="post">
                                        <input type="hidden" name="requestId" th:value="${request.id}">
                                        <button type="submit" class="btn btn-success btn-sm rounded-pill px-3">
                                            <i class="fas fa-check me-1"></i> Accept
                                        </button>
                                    </form>
                                    
                                    <form th:action="@{/rejectFriendRequest}" method="post">
                                        <input type="hidden" name="requestId" th:value="${request.id}">
                                        <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill px-3">
                                            <i class="fas fa-times me-1"></i> Reject
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/dashboard.js"></script>
    <script src="/js/navbar.js"></script>
</body>
</html>
