<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="navbar(activePage)" class="d-flex flex-column p-3 bg-secondary flex-shrink-0 navbar-main">

        <!-- Upper Navbar Pod -->
        <div id="dynamic-sidebar-container"> 
            <div id="dynamic-sidebar" class="rounded-4 py-3 px-0 pod-collapsed">
                <div th:replace="~{fragments/navbar-upper :: navbar-upper(activePage=${activePage})}"></div>
            </div>
        </div>

        <!-- Lower Navbar (Stays fixed) -->
        <div class="mt-auto d-flex flex-column align-items-center gap-4 pb-3">
            <a href="#" id="theme-toggle" class="text-theme-icon text-decoration-none" title="Toggle Theme">
                <i id="theme-icon" class="fa-solid fa-moon"></i>
            </a>

            <a href="/settings" class="text-theme-icon text-decoration-none" title="Settings">
                <i class="fa-solid fa-gear"></i>
            </a>

            <a href="/logout" 
               class="d-flex justify-content-center align-items-center text-white text-decoration-none rounded-3 logout-btn" 
               title="Logout"
               onclick="sessionStorage.clear()">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </a>
        </div>
    </div>
</body>
</html>
