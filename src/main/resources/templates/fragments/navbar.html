<!-- Note for injecting navbar -->
<!-- Use: <div th:replace="~{fragments/navbar :: navbar}"></div> -->
<!-- Put in body at the top level or near the top level -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="navbar" class="bg-main p-4 d-flex flex-column" style="width: 350px; flex-shrink: 1;">
    <div class="mb-5 mt-3 d-flex flex-column gap-3">
        <div class="d-flex gap-3">
            <div class="rounded" style="width: 40px; height: 40px; background-color: var(--bg-input); flex-shrink: 0;"></div>
            <div class="d-flex flex-column justify-content-start pt-2">
                <strong class="text-uppercase text-white fw-bold lh-1 mb-1" style="font-size: 13px; letter-spacing: 1px;" th:text="${session.session_user.username}">admin</strong>

                <span class="text-uppercase lh-1" style="font-size: 11px; color: var(--text-secondary); letter-spacing: 0.5px;" th:text="${session.session_user.getRank()}"></span>
            </div>
        </div>
        
        <div class="w-100">
            <div class="d-flex justify-content-between mb-1" style="font-size: 10px; color: var(--text-secondary);">
                <span th:if="${!session.session_user.maxRank}" th:text="${session.session_user.rr} + ' RR'"></span>
                <span th:if="${session.session_user.maxRank}" class="fw-bold text-accent">Max Rank Reached!</span>
                <span th:if="${!session.session_user.maxRank}" th:text="${session.session_user.rr + session.session_user.pointsToNextRank} + ' RR'"></span>
            </div>
            <div class="progress" style="height: 4px; background-color: var(--bg-surface);">
                <div class="progress-bar bg-accent" role="progressbar" th:style="'width: ' + ${session.session_user.progressPercentage} + '%'" th:attr="aria-valuenow=${session.session_user.progressPercentage}" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
        </div>
    </div>
    
    <ul class="nav flex-column gap-2" style="font-size: 14px;">
        <li class="nav-item">
            <a href="#" class="nav-link text-black rounded px-3 py-2 fw-semibold bg-accent">
                Admin Dashboard
            </a>
        </li>
        
        <li class="nav-item">
            <a href="#" class="nav-link text-white rounded px-3 py-2 fw-semibold">
                Insight and Progress
            </a>
        </li>
        
        <li class="nav-item">
            <a href="#" class="nav-link text-white rounded px-3 py-2 fw-semibold">
                Nutrition Tracker
            </a>
        </li>
        
        <li class="nav-item">
            <a href="#" class="nav-link text-white rounded px-3 py-2 fw-semibold">
                Wellness Tracker
            </a>
        </li>
        
        <li class="nav-item">
            <a href="#" class="nav-link text-white rounded px-3 py-2 fw-semibold">
                Settings
            </a>
        </li>
    </ul>
</div>
</body>
</html>
