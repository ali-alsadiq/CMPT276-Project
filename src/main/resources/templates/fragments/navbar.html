<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

    <div th:fragment="navbar(activePage)" class="h-100">
        <!-- Desktop Sidebar -->
        <div id="sidebar-container" 
            class="d-none d-md-flex flex-column h-100 p-3 bg-secondary flex-shrink-0" 
            style="width: 100px;">
            
            <div class="bg-primary rounded-4 p-3 w-100">
                <div th:replace="~{fragments/navbarUpper :: navbar-upper(activePage=${activePage})}"></div>
            </div>

            <div class="mt-auto d-flex flex-column align-items-center w-100 mb-4 gap-4 px-0">
                <a href="#" class="nav-link p-0 text-white opacity-50" title="Toggle Theme">
                    <i class="fa-solid fa-moon" style="font-size: 1.2rem;"></i>
                </a>
                
                <a href="#" class="nav-link p-0 text-white opacity-50" title="Settings">
                    <i class="fa-solid fa-gear" style="font-size: 1.2rem;"></i>
                </a>

                <a href="/logout" class="nav-link p-0" title="Logout">
                    <div class="d-flex justify-content-center align-items-center rounded-3 bg-input text-white shadow-sm" 
                         style="width: 50px; height: 50px; font-size: 1.3rem; transition: all 0.2s ease;">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    </div>
                </a>
            </div>
        </div>

        <!-- Mobile Bottom Bar -->
        <div th:replace="~{fragments/navbarLower :: navbar-bottom(activePage=${activePage})}"></div>
    </div>

</body>
</html>
