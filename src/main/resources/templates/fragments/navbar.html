<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="navbar(activePage)" class="h-100">
        <div class="d-flex flex-column h-100 p-3 bg-secondary flex-shrink-0" style="width: 100px;">
            
            <!-- Upper Navbar -->
            <div class="bg-primary rounded-4 py-3 px-0 w-100" style="border: var(--outline-main);">
                <div th:replace="~{fragments/navbarUpper :: navbar-upper(activePage=${activePage})}"></div>
            </div>

            <!-- Lower Navbar -->
            <div class="mt-auto d-flex flex-column align-items-center gap-4 pb-3">
                
                <a href="#" class="text-white opacity-50 fs-5 text-decoration-none" title="Toggle Theme">
                    <i class="fa-solid fa-moon"></i>
                </a>
                
                <a href="#" class="text-white opacity-50 fs-5 text-decoration-none" title="Settings">
                    <i class="fa-solid fa-gear"></i>
                </a>

                <a href="/logout" 
                   class="d-flex justify-content-center align-items-center text-white text-decoration-none rounded-3 shadow-sm" 
                   style="width: 50px; height: 50px; background-color: var(--bg-input); border: var(--outline-main);" 
                   title="Logout">

                    <i class="fa-solid fa-arrow-right-from-bracket fs-5"></i>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
