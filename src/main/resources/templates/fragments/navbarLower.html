<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="navbar-bottom(activePage)" class="d-md-none fixed-bottom bg-main border-top border-secondary py-2" style="z-index: 1050;">
    <div class="container-fluid d-flex justify-content-around align-items-center">
        <a th:href="@{/dashboard}" class="nav-link text-center px-2 py-1 rounded"
           th:classappend="${activePage == 'dashboard' ? 'bg-accent text-black' : 'text-white'}"
           title="Home">
            <i class="fa-solid fa-house" style="font-size: 1.2rem; display: block;"></i>
        </a>
        
        <a th:href="@{/calorieTracker}" class="nav-link text-center px-2 py-1 rounded"
           th:classappend="${activePage == 'calorieTracker' ? 'bg-accent text-black' : 'text-white'}"
           title="Calories">
            <i class="fa-solid fa-utensils" style="font-size: 1.2rem; display: block;"></i>
        </a>
        
        <a th:href="@{/add-workout}" class="nav-link text-center px-2 py-1 rounded"
           th:classappend="${activePage == 'add-workout' ? 'bg-accent text-black' : 'text-white'}"
           title="Workouts">
            <i class="fa-solid fa-dumbbell" style="font-size: 1.2rem; display: block;"></i>
        </a>
        
        <a th:href="@{/adminDashboard}" class="nav-link text-center px-2 py-1 rounded"
           th:classappend="${activePage == 'adminDashboard' ? 'bg-accent text-black' : 'text-white'}"
           title="Admin">
            <i class="fa-solid fa-chart-line" style="font-size: 1.2rem; display: block;"></i>
        </a>
    </div>
</div>
</body>
</html>
