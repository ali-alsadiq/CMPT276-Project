<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="navbar-upper(activePage)" class="d-flex flex-column w-100 align-items-center" th:if="${session.session_user != null}">
    
    <div class="mb-5 mt-3 d-flex justify-content-center w-100">
        <div class="rounded-3 shadow-sm" style="width: 50px; height: 50px; background-color: var(--bg-input); flex-shrink: 0;"></div>
    </div>
    
    <ul class="nav flex-column gap-3 w-100 align-items-center m-0 p-0">
        
        <li class="nav-item">
            <a th:href="@{/adminDashboard}" 
               class="d-flex justify-content-center align-items-center rounded-3 shadow-sm text-decoration-none" 
               style="width: 50px; height: 50px; transition: all 0.2s ease;"
               th:classappend="${activePage == 'adminDashboard' ? 'bg-accent-1 text-black' : 'bg-input text-white'}"
               title="Admin Dashboard">
                <i class="fa-solid fa-shield-halved fs-5"></i>
            </a>
        </li>
        
        <li class="nav-item">
            <a th:href="@{/dashboard}" 
               class="d-flex justify-content-center align-items-center rounded-3 shadow-sm text-decoration-none" 
               style="width: 50px; height: 50px; transition: all 0.2s ease;"
               th:classappend="${activePage == 'dashboard' ? 'bg-accent-1 text-black' : 'bg-input text-white'}"
               title="Dashboard">
                <i class="fa-solid fa-chart-line fs-5"></i>
            </a>
        </li>
        
        <li class="nav-item">
            <a th:href="@{/calorieTracker}" 
               class="d-flex justify-content-center align-items-center rounded-3 shadow-sm text-decoration-none" 
               style="width: 50px; height: 50px; transition: all 0.2s ease;"
               th:classappend="${activePage == 'calorieTracker' ? 'bg-accent-1 text-black' : 'bg-input text-white'}"
               title="Calorie Tracker">
                <i class="fa-solid fa-apple-whole fs-5"></i>
            </a>
        </li>
        
        <li class="nav-item">
            <a th:href="@{/add-workout}" 
               class="d-flex justify-content-center align-items-center rounded-3 shadow-sm text-decoration-none" 
               style="width: 50px; height: 50px; transition: all 0.2s ease;"
               th:classappend="${activePage == 'add-workout' ? 'bg-accent-1 text-black' : 'bg-input text-white'}"
               title="Workout Tracker">
                <i class="fa-solid fa-dumbbell fs-5"></i>
            </a>
        </li>
        
    </ul>
</div>

</body>
</html>
