<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="navbar-upper(activePage)" class="d-flex flex-column w-100 align-items-center" th:if="${session.session_user != null}">
    
    <div class="mb-5 mt-3 d-flex flex-column gap-4 w-100 align-items-center">
        <!-- Avatar only -->
        <div class="d-flex justify-content-center w-100">
            <div class="rounded" style="width: 44px; height: 44px; background-color: var(--bg-input); flex-shrink: 0;"></div>
        </div>
    </div>
    
    <ul class="nav flex-column gap-4 w-100 align-items-center" style="font-size: 14px;">
        
        <li class="nav-item w-100 px-1">
            <a th:href="@{/adminDashboard}" class="nav-link rounded px-0 py-2 d-flex justify-content-center align-items-center fw-semibold text-nowrap"
               th:classappend="${activePage == 'adminDashboard' ? 'bg-accent text-black' : 'text-white'}"
               title="Admin Dashboard">
                <div class="d-flex justify-content-center align-items-center flex-shrink-0" style="width: 40px; font-size: 1.2rem;">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
            </a>
        </li>
        
        <li class="nav-item w-100 px-2">
            <a th:href="@{/dashboard}" class="nav-link rounded px-0 py-2 d-flex justify-content-center align-items-center fw-semibold text-nowrap"
               th:classappend="${activePage == 'dashboard' ? 'bg-accent text-black' : 'text-white'}"
               title="Dashboard">
                <div class="d-flex justify-content-center align-items-center flex-shrink-0" style="width: 40px; font-size: 1.2rem;">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
            </a>
        </li>
        
        <li class="nav-item w-100 px-2">
            <a th:href="@{/calorieTracker}" class="nav-link rounded px-0 py-2 d-flex justify-content-center align-items-center fw-semibold text-nowrap"
               th:classappend="${activePage == 'calorieTracker' ? 'bg-accent text-black' : 'text-white'}"
               title="Calorie Tracker">
                <div class="d-flex justify-content-center align-items-center flex-shrink-0" style="width: 40px; font-size: 1.2rem;">
                    <i class="fa-solid fa-apple-whole"></i>
                </div>
            </a>
        </li>
        
        <li class="nav-item w-100 px-2">
            <a th:href="@{/add-workout}" class="nav-link rounded px-0 py-2 d-flex justify-content-center align-items-center fw-semibold text-nowrap"
               th:classappend="${activePage == 'add-workout' ? 'bg-accent text-black' : 'text-white'}"
               title="Workout Tracker">
                <div class="d-flex justify-content-center align-items-center flex-shrink-0" style="width: 40px; font-size: 1.2rem;">
                    <i class="fa-solid fa-dumbbell"></i>
                </div>
            </a>
        </li>
        
    </ul>
</div>

</body>
</html>
