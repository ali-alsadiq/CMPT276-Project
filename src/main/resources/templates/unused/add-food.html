<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Nutrition Calculator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/css/style.css" rel="stylesheet" />
  </head>
  <body class="theme-bg overflow-auto vh-100 m-0">
    <div class="container mt-4 mb-5">
      <h1 class="text-white">Food Nutrition Calculator</h1>

      <form method="post" th:action="@{/add-food}">
        <div class="mb-3">
          <label for="foodDescription" class="form-label text-white"
            >Describe food consumed:</label
          >
          <input
            type="text"
            class="form-control"
            id="foodDescription"
            name="foodDescription"
            th:value="${foodDescriptionVal}"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary">
          Calculate Nutrition
        </button>
      </form>

      <div th:if="${error}" class="alert alert-danger mt-3">
        <span th:text="${error}"></span>
      </div>

      <div th:if="${successMessage}" class="alert alert-success">
        <span th:text="${successMessage}"></span>
      </div>

      <div th:if="${mealFoods != null and !mealFoods.isEmpty()}" class="mt-4">
        <h2 class="text-white">Foods Described:</h2>

        <div class="row">
          <div th:each="foodItem : ${mealFoods}" class="col-md-6 mb-3">
            <div class="card">
              <div class="card-body">
                <h5 class="card-title" th:text="${foodItem.foodName}"></h5>
                <p class="card-text">
                  Serving Size:
                  <span th:text="${foodItem.servSize}"></span>g<br />
                  Calories: <span th:text="${foodItem.calories}"></span><br />
                  Protein: <span th:text="${foodItem.protien}"></span>g<br />
                  Carbs: <span th:text="${foodItem.carbs}"></span>g<br />
                  Fats: <span th:text="${foodItem.fats}"></span>g
                </p>
              </div>
            </div>
          </div>
        </div>

        <form method="post" th:action="@{/meals/add}" class="mt-4">
          <div class="row">
            <div class="col-md-4 mb-3">
              <label for="mealType" class="form-label text-white"
                >Meal Type</label
              >
              <input
                type="text"
                class="form-control"
                id="mealType"
                name="mealType"
                placeholder="Breakfast, Lunch, Dinner, Snack"
                required
              />
            </div>

            <div class="col-md-4 mb-3">
              <label for="consumedDate" class="form-label text-white"
                >Consumed Date and Time</label
              >
              <input
                type="datetime-local"
                class="form-control"
                id="consumedDate"
                name="consumedDate"
                required
              />
            </div>
          </div>

          <div th:each="foodItem : ${mealFoods}">
            <input
              type="hidden"
              name="foodName"
              th:value="${foodItem.foodName}"
            />
            <input
              type="hidden"
              name="servSize"
              th:value="${foodItem.servSize}"
            />
            <input
              type="hidden"
              name="calories"
              th:value="${foodItem.calories}"
            />
            <input
              type="hidden"
              name="protien"
              th:value="${foodItem.protien}"
            />
            <input type="hidden" name="carbs" th:value="${foodItem.carbs}" />
            <input type="hidden" name="fats" th:value="${foodItem.fats}" />
            <input type="hidden" name="fiber" th:value="${foodItem.fiber}" />
            <input type="hidden" name="sugar" th:value="${foodItem.sugar}" />
            <input type="hidden" name="sodium" th:value="${foodItem.sodium}" />
            <input
              type="hidden"
              name="potassium"
              th:value="${foodItem.potassium}"
            />
            <input
              type="hidden"
              name="cholesterol"
              th:value="${foodItem.cholesterol}"
            />
          </div>

          <button type="submit" class="btn btn-success">Add Meal</button>
        </form>
      </div>
    </div>
  </body>
</html>
