<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nutrition Tracker</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/618d4f1d54.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/calorie-tracker.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/theme.js"></script>
    <link rel="stylesheet" href="/css/navbar.css">
</head>
<body class="theme-bg vh-100 m-0 overflow-hidden">
    <div class="d-flex h-100 w-100">

        <!-- Sidebar -->
        <div th:replace="~{shared/navbar :: navbar('calorie-tracker')}"></div>

        <!-- Main Content -->
        <div class="flex-grow-1 tracker-shell bg-secondary overflow-hidden" style="height: 100vh; margin-left: 110px;">
            <div class="row g-4 m-0 flex-grow-1 overflow-hidden">

                <!-- Logging Section -->
                <div th:replace="~{calorie-tracker/logging-fragment :: logging}"></div>
                
                <div class="col-xl-5 d-flex flex-column gap-4 overflow-hidden">
                    <!-- Meals -->
                    <div th:replace="~{calorie-tracker/meals-fragment :: meals}"></div>

                    <!-- Nutrition -->
                    <div th:replace="~{calorie-tracker/nutrition-fragment :: nutrition}"></div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/calorie-tracker.js}"></script>
    <script src="/js/navbar.js"></script>
</body>
</html>
