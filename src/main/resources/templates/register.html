<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Ascend - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-white d-flex align-items-center justify-content-center vh-100">
    <div class="bg-white p-5" style="width: 100%; max-width: 500px;">
        <h1 class="text-center mb-4">Register</h1>

        <form action="/register" method="POST">
            
            <div class="row mb-3">
                <div class="col">
                    <input type="text" class="form-control bg-light border-0 p-3" id="firstname" name="firstname" placeholder="First Name">
                </div>
                <div class="col">
                    <input type="text" class="form-control bg-light border-0 p-3" id="lastname" name="lastname" placeholder="Last Name">
                </div>
            </div>

            <div class="mb-3">
                <input type="text" class="form-control bg-light border-0 p-3" id="username" name="username" placeholder="Username">
            </div>

            <div class="mb-5">
                <input type="password" class="form-control bg-light border-0 p-3" id="password" name="password" placeholder="Password">
                <div class="progress mt-2" style="height: 5px;" id="password-strength-container">
                    <div id="password-strength-bar" class="progress-bar bg-danger" role="progressbar" style="width: 25%" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100"></div>
                </div>
                <small id="password-strength-text" class="text-danger mt-1 d-block">Weak</small>
            </div>
            
            <button type="submit" class="btn btn-dark w-100 p-3 rounded-pill">Create Account</button>
        </form>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('password-strength-bar');
        const strengthText = document.getElementById('password-strength-text');

        passwordInput.addEventListener('input', function() {
            if (passwordInput.value.length > 0) {
                strengthBar.style.width = '75%';
                strengthBar.className = 'progress-bar bg-success';
                strengthText.textContent = 'Good';
                strengthText.className = 'text-success mt-1 d-block';
            } else {
                strengthBar.style.width = '25%';
                strengthBar.className = 'progress-bar bg-danger';
                strengthText.textContent = 'Weak';
                strengthText.className = 'text-danger mt-1 d-block';
            }
        });
    </script>
</body>

</html>
