<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/618d4f1d54.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/calorie-tracker.css">
    <link rel="stylesheet" href="/css/components.css">
    <script src="/js/theme.js"></script>
    <link rel="stylesheet" href="/css/navbar.css">
</head>
<body class="theme-bg vh-100 m-0 overflow-hidden">
    <div class="d-flex h-100 w-100">

        <!-- Navbar -->
        <div th:replace="~{shared/navbar :: navbar('admin-dashboard')}"></div>

        <!-- Main Content -->
        <div class="flex-grow-1 tracker-shell bg-secondary overflow-hidden" style="height: 100vh; margin-left: 110px;">
            <div class="row g-4 m-0 flex-grow-1 overflow-hidden">

                <!-- User List Column -->
                <div class="col-xl-8 d-flex flex-column overflow-hidden h-80">
                    <section class="tracker-panel gradient-tl d-flex flex-column h-100 overflow-hidden">
                        <div class="mb-4">
                            <p class="eyebrow mb-2 text-accent-1">ADMIN</p>
                            <h1 class="panel-title text-theme-primary" style="font-weight: 500; letter-spacing: normal;">USER DIRECTORY</h1>
                            <p class="panel-copy text-secondary">Manage and view all registered users in the system.</p>
                        </div>

                        <!-- User List (using meals-scrollable/meal-row style) -->
                        <div class="meals-scrollable flex-grow-1" style="max-height: none; min-height: 0;">
                            <div id="user-list-container">
                                <div class="meal-row" th:each="user : ${users}">
                                    <div class="rounded-3" style="width: 44px; height: 44px; background: var(--bg-subtle-box); flex-shrink: 0; display: flex; align-items: center; justify-content: center;">
                                        <i class="fa-solid fa-user text-secondary"></i>
                                    </div>
                                    <div class="meal-info">
                                        <div class="meal-name-row">
                                            <span class="meal-name" th:text="${user.username}">username</span>
                                            <span class="meal-cals" th:text="'UID ' + ${user.uid}">UID 0</span>
                                        </div>
                                        <div class="d-flex align-items-center gap-2 mt-1">
                                            <span class="badge rounded-pill text-black bg-accent-1 px-2 py-1" 
                                                  style="font-size: 0.65rem;" 
                                                  th:if="${user.role == 'ADMIN'}">ADMIN</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>


                    </section>
                </div>
            </div>
        </main>
    <script src="/js/navbar.js"></script>
</body>
</html>
