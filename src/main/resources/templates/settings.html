<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/618d4f1d54.js" crossorigin="anonymous"></script>
    <link href="/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/workoutTracker.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <script src="/js/theme.js"></script>
</head>
<body class="theme-bg overflow-hidden vh-100 m-0">
    <div class="d-flex h-100 w-100">
        <div th:replace="~{fragments/navbar :: navbar('settings')}"></div>

        <div class="flex-grow-1 workout-shell overflow-auto" style="margin-left: 110px;">
            <div class="workout-main-card">
                <div class="row g-4 h-100">
                    <div class="col-xl-6 d-flex">
                        <section class="tracker-panel tracker-panel-form neon-pulse w-100">
                            <div class="mb-4">
                                <p class="eyebrow mb-2">Settings</p>
                                <h1 class="panel-title">YOUR PREFERENCES</h1>
                                <p class="panel-copy">Adjust your preferences.</p>
                            </div>

                            <form th:action="@{/settings}" method="POST" id="settings-form" class="settings-form d-flex flex-column justify-content-between h-100">
                                <div class="settings-sections">
                                    <!-- Theme Selector -->
                                    <div class="mb-5">
                                        <label class="eyebrow d-block mb-3">Theme</label>
                                        <select class="form-select tracker-input" name="theme" id="theme-selector">
                                            <option value="dark">Dark Mode</option>
                                            <option value="light">Light Mode</option>
                                        </select>
                                    </div>
                                            
                                <button type="submit" class="btn tracker-submit w-100 fw-bold mt-auto">SAVE CHANGES</button>
                            </form>
                        </section>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/workoutTracker.js}"></script>
    <script src="/js/navbar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeSelector = document.getElementById('theme-selector');
            const settingsForm = document.getElementById('settings-form');
            
            // Set initial value from localStorage
            const currentTheme = localStorage.getItem('theme') || 'dark';
            themeSelector.value = currentTheme;

            settingsForm.addEventListener('submit', (e) => {
                const selectedTheme = themeSelector.value;
                localStorage.setItem('theme', selectedTheme);
                document.documentElement.setAttribute('data-theme', selectedTheme);
                
                // If there's a theme icon in the navbar, update it too
                const themeIcon = document.getElementById('theme-icon');
                if (themeIcon) {
                    themeIcon.classList.toggle('fa-sun', selectedTheme === 'light');
                    themeIcon.classList.toggle('fa-moon', selectedTheme === 'dark');
                }
            });
        });
    </script>
</body>
</html>
